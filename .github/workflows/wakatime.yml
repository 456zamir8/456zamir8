name: Waka Readme

on:
  schedule:
    - cron: "0 */6 * * *"  # updates every 6 hrs
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
